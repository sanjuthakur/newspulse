services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: newspulse
      POSTGRES_USER: newspulse
      POSTGRES_PASSWORD: newspulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newspulse -d newspulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://newspulse:newspulse@db:5432/newspulse
      ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
      SEED_DATA: "true"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
