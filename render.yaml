databases:
  - name: newspulse-db
    databaseName: newspulse
    user: newspulse

services:
  - type: web
    name: newspulse-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.4
      - key: DATABASE_URL
        fromDatabase:
          name: newspulse-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SEED_DATA
        value: "true"
